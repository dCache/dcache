- name: Mirror to GitLab + wait for CI
        env:
          GITLAB_PASSWORD: ${{ secrets.GITLAB_PASSWORD }}
          GITLAB_PROJECT_ID: "21"
        run: |
          set -euo pipefail
          REMOTE="https://dcache:${GITLAB_PASSWORD}@gitlab.desy.de/dcache/dcache.git"
          git remote add mirror "$REMOTE"
          GIT_OPTS="-c http.connectTimeout=15 -c http.lowSpeedLimit=1000 -c http.lowSpeedTime=30"

          if ! curl -sf --connect-timeout 10 --max-time 15 \
              -o /dev/null "https://gitlab.desy.de"; then
            echo "::error::gitlab.desy.de is unreachable from this runner — this is a transient GitHub→DESY network issue. Re-run the job to get a fresh runner."
            exit 1
          fi

          push_branch() {
            for attempt in 1 2 3; do
              echo "::group::Branch push attempt $attempt"
              if git $GIT_OPTS push mirror --force "HEAD:${GITHUB_REF_NAME}"; then
                echo "::endgroup::"; return 0
              fi
              echo "::endgroup::"
              [ $attempt -lt 3 ] && sleep $((attempt * 15))
            done
            echo "::error::Branch push failed after 3 attempts"; return 1
          }

          push_tags() {
            local out
            out=$(git $GIT_OPTS push mirror --tags 2>&1) && return 0
            if echo "$out" | grep '^ ! \[rejected\]' | grep -qv 'already exists'; then
              echo "$out"
              echo "::error::Tag push had unexpected rejections"
              return 1
            fi
            echo "$out" | grep -c 'already exists' | xargs -I{} echo "Skipped {} existing tags"
            return 0
          }

          push_branch
          push_tags

          API="https://gitlab.desy.de/api/v4/projects/${GITLAB_PROJECT_ID}"
          AUTH="PRIVATE-TOKEN: ${GITLAB_PASSWORD}"
          PIPELINE_ID=""

          for i in $(seq 1 12); do
            PIPELINE_ID=$(curl -sf --connect-timeout 10 --header "$AUTH" \
              "${API}/pipelines?sha=${GITHUB_SHA}&order_by=id&sort=desc&per_page=1" | \
              python3 -c "import sys,json; p=json.load(sys.stdin); print(p[0]['id']) if p else exit(1)" 2>/dev/null) && break
            echo "Pipeline not registered yet (${i}/12)..."
            sleep 10
          done

          [ -z "$PIPELINE_ID" ] && echo "::error::No pipeline found for ${GITHUB_SHA}" && exit 1

          PIPELINE_URL="https://gitlab.desy.de/dcache/dcache/-/pipelines/${PIPELINE_ID}"
          echo "Pipeline: ${PIPELINE_URL}"
          echo "### GitLab Pipeline [#${PIPELINE_ID}](${PIPELINE_URL})" >> "$GITHUB_STEP_SUMMARY"

          for i in $(seq 1 60); do
            STATUS=$(curl -sf --connect-timeout 10 --header "$AUTH" \
              "${API}/pipelines/${PIPELINE_ID}" | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "[$i/60] Status: $STATUS"
            case "$STATUS" in
              success) exit 0 ;;
              failed|canceled|skipped) echo "::error::Pipeline ${STATUS}: ${PIPELINE_URL}"; exit 1 ;;
            esac
            sleep 60
          done
          echo "::error::Timed out: ${PIPELINE_URL}"; exit 1