apiVersion: v1
kind: ConfigMap
metadata:
  name: dummy-hsm-script
data:
  dummy-hsm.sh: |
    #!/bin/bash
    ACTION="$1"
    PNFSID="$2"

    case "$ACTION" in
        put)
            # Print dummy storage URI to stdout for dCache registration
            echo "dummy://dummy/?store=default&group=default&bfid=${PNFSID:-000000000000}"
            exit 0
            ;;
        get|remove|*)
            exit 0
            ;;
    esac