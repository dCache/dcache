stages:
  - build
  - deploy

variables:
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true -DdeployAtEnd=true -Dmaven.repo.local=.m2/repository"
  MANUALS_DIR: "/data/www/old-dcache.org/manuals"
  DRY_RUN_DIR: "/data/www/old-dcache.org/manuals/Book-11.2-dryrun"
  BOOK_VERSION: "11.2"
  FRAGS_DIR: "/data/www/old-dcache.org/template/frags"

build-thebook:
  stage: build
  image: maven:3.9.12-eclipse-temurin-21
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests -pl docs/TheBook -am clean install
    - cd docs/TheBook/target/
    - mkdir shtml_build
    - cp -r html/* shtml_build/
    - cd shtml_build
    - find . -name "*.html" -exec sh -c 'mv "$1" "${1%.html}.shtml"' _ {} \;
    - find . -name "*.shtml" -exec sed -i 's/\.html/\.shtml/g' {} +
    - tar -czf ../TheBook-shtml.tar.gz .
  artifacts:
    paths:
      - "docs/TheBook/target/TheBook-shtml.tar.gz"
    expire_in: 1 day

deploy-dryrun:
  stage: deploy
  tags:
    - hugo
    - www.dcache.org
  dependencies:
    - build-thebook
  script:
    - echo "=== Phase 1 - Safety checks ==="
    - |
      if [ -d "${DRY_RUN_DIR}" ]; then
        echo "ERROR - ${DRY_RUN_DIR} already exists. Remove it first."
        exit 1
      fi

    - echo "=== Phase 2 - Ensure header fragment exists for this version ==="
    - |
      if [ ! -f "${FRAGS_DIR}/header-docs-${BOOK_VERSION}.shtml" ]; then
        cp "${FRAGS_DIR}/header-docs-10.2.shtml" "${FRAGS_DIR}/header-docs-${BOOK_VERSION}.shtml"
        sed -i "s/10\.2/${BOOK_VERSION}/g" "${FRAGS_DIR}/header-docs-${BOOK_VERSION}.shtml"
        echo "Created header-docs-${BOOK_VERSION}.shtml"
      else
        echo "header-docs-${BOOK_VERSION}.shtml already exists, skipping"
      fi

    - echo "=== Phase 3 - Extract to staging ==="
    - STAGING_DIR="${DRY_RUN_DIR}_staging"
    - mkdir -p "$STAGING_DIR"
    - tar -xzf docs/TheBook/target/TheBook-shtml.tar.gz -C "$STAGING_DIR"
    - SHTML_COUNT=$(find "$STAGING_DIR" -name "*.shtml" | wc -l)
    - echo "Extracted $SHTML_COUNT shtml files"
    - |
      if [ "$SHTML_COUNT" -lt 10 ]; then
        echo "ERROR - too few shtml files extracted"
        exit 1
      fi

    - echo "=== Phase 4 - Rewrite head block and inject SSI and ribbon per file ==="
    - |
      for f in "$STAGING_DIR"/*.shtml; do
        BASENAME=$(basename "$f" .shtml)
        TITLE=$(grep -o '<title>[^<]*</title>' "$f" | head -1)
        python3 -c "
import sys
filepath = '$f'
basename = '$BASENAME'
title = '$TITLE'
book_version = '${BOOK_VERSION}'
new_head = '''<head>
    { title }
    <meta charset=\"utf-8\" />
    <meta name=\"description\" content=\"The dCache Book is the guide for administrators of dCache system, describing how to install and configure dCache.\">
    <!--#include virtual=\"/template/frags/std-html-head.shtml\"-->
    <link rel=\"stylesheet\" href=\"https://cdnjs.cloudflare.com/ajax/libs/github-fork-ribbon-css/0.2.2/gh-fork-ribbon.min.css\" />
    <link rel=\"stylesheet\" href=\"css/dCacheBook-common.css\" />
    <link rel=\"stylesheet\" href=\"/css/prism.css\" />
    <link rel=\"stylesheet\" href=\"css/dCacheBook-dcacheorg.css\" />
    <script src=\"/lib/prism.js\"></script>
</head>
<body>
<!--#include virtual=\"/template/frags/header-beginning.shtml\" -->
<!--#include virtual=\"/template/frags/header-docs-{book_version}.shtml\" -->
<!--#include virtual=\"/template/frags/header-end.shtml\" -->
<a class=\"github-fork-ribbon\" href=\"https://github.com/dCache/dcache/blob/master/docs/TheBook/src/main/markdown/{basename}.md\" data-ribbon=\"Edit me on GitHub\" title=\"Edit me on GitHub\">Edit me on GitHub</a>'''.format(title=title, book_version=book_version, basename=basename)
with open(filepath, 'r') as fh:
    content = fh.read()
start = content.find('<head>')
body_pos = content.find('<body>')
end = body_pos + len('<body>')
if start == -1 or body_pos == -1:
    print('WARNING - no head/body in ' + filepath)
    sys.exit(0)
before = content[:start]
after = content[end:]
with open(filepath, 'w') as fh:
    fh.write(before + new_head + after)
"
      done
    
    - echo "=== Phase 5 - Verify injection ==="
    - echo "--- First 20 lines of index.shtml after injection ---"
    - head -20 "$STAGING_DIR/index.shtml"
    - MISSING=$(grep -rL "include virtual" "$STAGING_DIR"/*.shtml | wc -l)
    - echo "Files still missing SSI includes $MISSING (should be 0)"

    - echo "=== Phase 6 - Deploy to dryrun dir ==="
    - mv "$STAGING_DIR" "${DRY_RUN_DIR}"
    - echo "Deployed to ${DRY_RUN_DIR}"
    - echo "Visit https://www.dcache.org/old/manuals/Book-11.2-dryrun/index.shtml"

    - echo "=== Phase 7 - Verify neighbors untouched ==="
    - ls -la "${MANUALS_DIR}/Book-10.2/" | head -3
    - ls -la "${MANUALS_DIR}/Book-9.2/" | head -3

after_script:
  - rm -rf "${DRY_RUN_DIR}_staging" || true

cleanup-dryrun:
  stage: deploy
  tags:
    - hugo
    - www.dcache.org
  when: manual
  script:
    - rm -rf "${DRY_RUN_DIR}"
    - echo "Removed ${DRY_RUN_DIR}"