stages:
  - build
  - deploy

variables:
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true -DdeployAtEnd=true -Dmaven.repo.local=.m2/repository"
  MANUALS_DIR: "/data/www/old-dcache.org/manuals"
  FRAGS_DIR: "/data/www/old-dcache.org/template/frags"
  BOOK_VERSION: "11.2"
  BOOK_DEPLOY_DIR: "/data/www/old-dcache.org/manuals/Book-11.2-dryrun"
  USERGUIDE_DEPLOY_DIR: "/data/www/old-dcache.org/manuals/UserGuide-11.2-dryrun"

# ---------------------------------------------------------------------------
# BUILD JOBS
# ---------------------------------------------------------------------------

build-thebook:
  stage: build
  image: maven:3.9.12-eclipse-temurin-21
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests -pl docs/TheBook -am clean install -P dcache.org
    - tar -czf TheBook-shtml.tar.gz -C docs/TheBook/target/intermediate-html .
  artifacts:
    paths: ["TheBook-shtml.tar.gz"]
    expire_in: 1 day

build-userguide:
  stage: build
  image: maven:3.9.12-eclipse-temurin-21
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests -pl docs/UserGuide -am clean install -P dcache.org
    - tar -czf UserGuide-shtml.tar.gz -C docs/UserGuide/target/intermediate-html .
  artifacts:
    paths: ["UserGuide-shtml.tar.gz"]
    expire_in: 1 day

# ---------------------------------------------------------------------------
# DEPLOY JOBS
# ---------------------------------------------------------------------------

deploy-thebook:
  stage: deploy
  tags:
    - hugo
    - www.dcache.org
  dependencies:
    - build-thebook
  script:
    - echo "=== Phase 1 - Generate per-version header fragment with correct active highlight ==="
    - FRAG_FILE="${FRAGS_DIR}/header-docs-${BOOK_VERSION}.shtml"
    - |
      BOOK_VERSIONS="5.0 5.1 5.2 6.0 6.1 6.2 7.0 7.1 7.2 8.0 8.1 8.2 9.0 9.1 9.2 10.0 10.1 10.2 11.0 11.1 11.2"
      if ! echo "$BOOK_VERSIONS" | grep -qw "$BOOK_VERSION"; then
        BOOK_VERSIONS="$BOOK_VERSIONS $BOOK_VERSION"
      fi

      UG_VERSIONS="5.1 5.2 6.0 6.1 6.2 7.0 7.1 7.2 8.0 8.1 8.2 9.0 9.1 9.2 10.0 10.1 10.2 11.0 11.1 11.2"
      if ! echo "$UG_VERSIONS" | grep -qw "$BOOK_VERSION"; then
        UG_VERSIONS="$UG_VERSIONS $BOOK_VERSION"
      fi

      BOOK_LINKS=""
      for v in $BOOK_VERSIONS; do
        if [ "$v" = "$BOOK_VERSION" ]; then
          BOOK_LINKS="${BOOK_LINKS} <span class=\"activ\">${v}</span>,"
        else
          BOOK_LINKS="${BOOK_LINKS} <a href=\"/manuals/Book-${v}/\">${v}</a>,"
        fi
      done
      BOOK_LINKS="${BOOK_LINKS%,}"

      UG_LINKS=""
      for v in $UG_VERSIONS; do
        UG_LINKS="${UG_LINKS} <a href=\"/manuals/UserGuide-${v}/\">${v}</a>,"
      done
      UG_LINKS="${UG_LINKS%,}"

      cat > "$FRAG_FILE" << FRAGEOF
      <div class="book-navi">
      <a href="/manuals/releasenotes.shtml">release notes</a>
      | UserGuide:${UG_LINKS}
      | Book:${BOOK_LINKS}
      | <a href="http://trac.dcache.org/trac.cgi/wiki">Wiki</a>
      | <a href="/manuals/FAQ.shtml">Q&amp;A</a>
      <img src="/images/black_bg.png" width="100%" height="1" alt="black_bg" border="0" />
      </div>
      FRAGEOF
      echo "Created ${FRAG_FILE}"

    - echo "=== Phase 2 - Extract to staging ==="
    - STAGING_DIR="${BOOK_DEPLOY_DIR}_staging"
    - rm -rf "$STAGING_DIR"
    - mkdir -p "$STAGING_DIR"
    - tar -xzf TheBook-shtml.tar.gz -C "$STAGING_DIR"
    - SHTML_COUNT=$(find "$STAGING_DIR" -name "*.shtml" | wc -l)
    - echo "Extracted $SHTML_COUNT shtml files"
    - |
      if [ "$SHTML_COUNT" -lt 10 ]; then
        echo "ERROR - too few shtml files extracted"
        exit 1
      fi

    - echo "=== Phase 3 - Resolve Maven placeholders ==="
    - |
      for f in $(find "$STAGING_DIR" -name "*.shtml"); do
        sed -i "s/@parsedVersion\.majorVersion@\.@parsedVersion\.minorVersion@/${BOOK_VERSION}/g" "$f"
        sed -i "s|@github\.url-prefix@|https://github.com/dCache/dcache/blob/master/docs/TheBook/src/main/markdown|g" "$f"
        sed -i "/github-fork-ribbon/s/\.shtml/\.md/g" "$f"
      done

    - echo "=== Phase 4 - Verify no unresolved placeholders ==="
    - COUNT=$(grep -r "@parsedVersion" "$STAGING_DIR" | wc -l)
    - echo "Unresolved placeholders remaining $COUNT (should be 0)"
    - |
      if [ "$COUNT" -gt 0 ]; then
        echo "ERROR - unresolved Maven placeholders found"
        exit 1
      fi

    - echo "=== Phase 5 - Atomic deploy ==="
    - |
      if [ -d "${BOOK_DEPLOY_DIR}" ]; then
        mv "${BOOK_DEPLOY_DIR}" "${BOOK_DEPLOY_DIR}_old"
      fi
    - mv "$STAGING_DIR" "${BOOK_DEPLOY_DIR}"
    - rm -rf "${BOOK_DEPLOY_DIR}_old"
    - echo "Deployed TheBook to ${BOOK_DEPLOY_DIR}"
    - echo "Visit https://www.dcache.org/old/manuals/Book-11.2-dryrun/index.shtml"

  after_script:
  - |
    if [ "$CI_JOB_STATUS" != "success" ]; then
      if [ -d "${BOOK_DEPLOY_DIR}_old" ] && [ ! -d "${BOOK_DEPLOY_DIR}" ]; then
        mv "${BOOK_DEPLOY_DIR}_old" "${BOOK_DEPLOY_DIR}"
        echo "Rollback complete"
      fi
    else
      rm -rf "${BOOK_DEPLOY_DIR}_old"
    fi
  - rm -rf "${BOOK_DEPLOY_DIR}_staging" || true

deploy-userguide:
  stage: deploy
  tags:
    - hugo
    - www.dcache.org
  dependencies:
    - build-userguide
  script:
    - echo "=== Phase 1 - Generate per-version header fragment with correct active highlight ==="
