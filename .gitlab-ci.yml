stages:
  - build
  - deploy

variables:
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true -DdeployAtEnd=true -Dmaven.repo.local=.m2/repository"
  MANUALS_DIR: "/data/www/old-dcache.org/manuals"
  DRY_RUN_DIR: "/data/www/old-dcache.org/manuals/Book-11.2-dryrun"
  DRY_RUN_GUIDE: "/data/www/old-dcache.org/manuals/UserGuide-11.2-dryrun"

build-all-docs:
  stage: build
  image: maven:3.9.12-eclipse-temurin-21
  script:
    # Build both Book and UserGuide
    - mvn $MAVEN_CLI_OPTS -DskipTests -pl docs/TheBook,docs/UserGuide -am clean install

    # Process The Book
    - cd docs/TheBook/target/html
    - find . -name "*.html" -exec sh -c 'mv "$1" "${1%.html}.shtml"' _ {} \;
    - find . -name "*.shtml" -exec sed -i 's/\.html/\.shtml/g' {} +
    # (SSI wrapping logic would go here as previously discussed)
    - tar -czf ../../../TheBook-shtml.tar.gz .
    - cd ../../../

    # Process UserGuide
    - cd docs/UserGuide/target/html
    - find . -name "*.html" -exec sh -c 'mv "$1" "${1%.html}.shtml"' _ {} \;
    - find . -name "*.shtml" -exec sed -i 's/\.html/\.shtml/g' {} +
    - tar -czf ../../../UserGuide-shtml.tar.gz .
  artifacts:
    paths:
      - "TheBook-shtml.tar.gz"
      - "UserGuide-shtml.tar.gz"
    expire_in: 1 day

deploy-dryrun:
  stage: deploy
  tags:
    - hugo
    - www.dcache.org
  script:
    - |
      for DOC_TYPE in "Book" "UserGuide"; do
        TARGET_DIR=$( [ "$DOC_TYPE" == "Book" ] && echo "$DRY_RUN_BOOK" || echo "$DRY_RUN_GUIDE" )
        ARCHIVE=$( [ "$DOC_TYPE" == "Book" ] && echo "TheBook-shtml.tar.gz" || echo "UserGuide-shtml.tar.gz" )
      
        echo "=== Phase 1 - Safety Check for $DOC_TYPE ==="
        if [[ "$TARGET_DIR" =~ ^.*/(Book|UserGuide)-(10\.[0-9]|9\.[0-9])$ ]]; then
          echo "CRITICAL ERROR: $TARGET_DIR is a protected production path!"
          exit 1
        fi

        echo "=== Phase 2 - Atomic Deployment for $DOC_TYPE ==="
        STAGING_DIR="${TARGET_DIR}_tmp_$(date +%s)"
        mkdir -p "$STAGING_DIR"
        tar -xzf "$ARCHIVE" -C "$STAGING_DIR"

        echo "=== Phase 3 - Validation ==="
        # Verify file count and lack of raw .html
        COUNT=$(ls -1 "$STAGING_DIR"/*.shtml | wc -l)
        if [ "$COUNT" -lt 5 ]; then echo "Error - Deployment for $DOC_TYPE too small!"; exit 1; fi
      
        echo "=== Phase 4 - Safe Swap ==="
        [ -d "$TARGET_DIR" ] && rm -rf "$TARGET_DIR"
        mv "$STAGING_DIR" "$TARGET_DIR"
        echo "Successfully deployed $DOC_TYPE to $TARGET_DIR"
      done

cleanup-dryrun:
  stage: deploy
  tags:
    - hugo
    - www.dcache.org
  when: manual
  script:
    - rm -rf "${DRY_RUN_BOOK}" "${DRY_RUN_GUIDE}"
    - echo "Cleaned up dryrun directories."