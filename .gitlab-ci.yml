stages:
  - build
  - inspect

variables:
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true -DdeployAtEnd=true -Dmaven.repo.local=.m2/repository"

build-thebook:
  stage: build
  image: maven:3.9.12-eclipse-temurin-21
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests -pl docs/TheBook -am clean install
    # Convert to SHTML before archiving
    - cd docs/TheBook/target/
    - mkdir shtml_build
    - cp -r html/* shtml_build/
    - cd shtml_build
    - find . -name "*.html" -exec sh -c 'mv "$1" "${1%.html}.shtml"' _ {} \;
    - find . -name "*.shtml" -exec sed -i 's/\.html/\.shtml/g' {} +
    - tar -czf ../TheBook-shtml.tar.gz .
  artifacts:
    paths:
      - "docs/TheBook/target/TheBook-shtml.tar.gz"
    expire_in: 1 day

inspect-thebook:
  stage: inspect
  tags:
    - hugo
    - www.dcache.org
  dependencies:
    - build-thebook
  script:
    - echo "=== Checking Artifact ==="
    - ls -lh docs/TheBook/target/TheBook-shtml.tar.gz
    - tar -tzvf docs/TheBook/target/TheBook-shtml.tar.gz | head -n 10 || true

    - echo "=== Checking Web Server Access ==="
    - ls -la /data/www/dcache.org/ || echo "Web root not accessible"
    - ls -la /data/www/dcache.org/manuals/ || echo "Manuals folder not accessible"

deploy-test-sudo:
  stage: inspect
  tags:
    - hugo
    - www.dcache.org
  dependencies:
    - build-thebook
  script:
    - echo "Testing if we can use sudo without a password..."
    - sudo -n true && echo "SUCCESS! We have passwordless sudo." || echo "FAILURE! Sudo requires a password."

    - echo "Checking if we can see the target directory with sudo..."
    - sudo ls -la /data/www/dcache.org/manuals/ || echo "Even with sudo, we can't see the folder."

detective-work:
  stage: inspect
  tags:
    - hugo
    - www.dcache.org
  script:
    - echo "=== Locating the existing manuals ==="
    # This searches for any folder named 'Book-10.2' inside /data/www/
    - find /data/www/ -type d -name "Book-10.2" 2>/dev/null || echo "Book-10.2 not found in /data/www/"

    - echo "=== Checking for Symlinks ==="
    # This checks if 'manuals' is a hidden link we missed
    - ls -ld /data/www/dcache.org/manuals || echo "Manuals is not a link in the root"

    - echo "=== Checking for other dcache directories ==="
    - ls -F /data/www/