stages:
  - build
  - inspect

variables:
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true -DdeployAtEnd=true -Dmaven.repo.local=.m2/repository"

build-thebook:
  stage: build
  image: maven:3.9.12-eclipse-temurin-21
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests -pl docs/TheBook -am clean install
    # Convert to SHTML before archiving
    - cd docs/TheBook/target/
    - mkdir shtml_build
    - cp -r html/* shtml_build/
    - cd shtml_build
    - find . -name "*.html" -exec sh -c 'mv "$1" "${1%.html}.shtml"' _ {} \;
    - find . -name "*.shtml" -exec sed -i 's/\.html/\.shtml/g' {} +
    - tar -czf ../TheBook-shtml.tar.gz .
  artifacts:
    paths:
      - "docs/TheBook/target/TheBook-shtml.tar.gz"
    expire_in: 1 day

inspect-thebook:
  stage: inspect
  tags:
    - hugo
    - www.dcache.org
  dependencies:
    - build-thebook
  script:
    - echo "=== Checking Artifact ==="
    - ls -lh docs/TheBook/target/TheBook-shtml.tar.gz
    - tar -tzvf docs/TheBook/target/TheBook-shtml.tar.gz | head -n 10 || true

    - echo "=== Checking Web Server Access ==="
    - ls -la /data/www/dcache.org/ || echo "Web root not accessible"
    - ls -la /data/www/dcache.org/manuals/ || echo "Manuals folder not accessible"

deploy-test-sudo:
  stage: inspect
  tags:
    - hugo
    - www.dcache.org
  dependencies:
    - build-thebook
  script:
    - echo "Testing if we can use sudo without a password..."
    - sudo -n true && echo "SUCCESS! We have passwordless sudo." || echo "FAILURE! Sudo requires a password."

    - echo "Checking if we can see the target directory with sudo..."
    - sudo ls -la /data/www/dcache.org/manuals/ || echo "Even with sudo, we can't see the folder."

detective-work:
  stage: inspect
  tags:
    - hugo
    - www.dcache.org
  script:
    - echo "=== Locating the existing manuals ==="
    # This searches for any folder named 'Book-10.2' inside /data/www/
    - find /data/www/ -type d -name "Book-10.2" 2>/dev/null || echo "Book-10.2 not found in /data/www/"

    - echo "=== Checking for Symlinks ==="
    # This checks if 'manuals' is a hidden link we missed
    - ls -ld /data/www/dcache.org/manuals || echo "Manuals is not a link in the root"

    - echo "=== Checking for other dcache directories ==="
    - ls -F /data/www/

extensive-debug:
  stage: inspect
  tags:
    - hugo
    - www.dcache.org
  script:
    - echo "=== 1. Deep Dive into the Manuals Anchor ==="
    # Check the actual structure where we know books exist
    - ls -lF /data/www/old-dcache.org/manuals/

    - echo "=== 2. Detailed Search for UserGuide === "
    # Search for any directory or index file related to UserGuide
    - find /data/www/ -type d -iname "*UserGuide*" 2>/dev/null
    - find /data/www/ -type f -name "UserGuide.shtml" -o -name "UserGuide.html" 2>/dev/null

    - echo "=== 3. Comparing 'old-dcache.org' vs 'dcachedocs' ==="
    # Let's see which one has more recent activity
    - echo "Last modified files in old-dcache.org:"
    - find /data/www/old-dcache.org/ -type f -printf '%T+ %p\n' 2>/dev/null | sort -r | head -n 5
    - echo "Last modified files in dcachedocs:"
    - find /data/www/dcachedocs/ -type f -printf '%T+ %p\n' 2>/dev/null | sort -r | head -n 5

    - echo "=== 4. Checking for User/Group Permissions on the target ==="
    # This is crucial for the sysadmin request. We need to know who owns the 'manuals' folder.
    - ls -ld /data/www/old-dcache.org/manuals/

    - echo "=== 5. Scanning for .shtml files specifically ==="
    # Since dCache.org uses shtml, let's see where they are most concentrated
    - find /data/www/ -name "*.shtml" 2>/dev/null | cut -d/ -f1-4 | sort | uniq -c

    - echo "=== 6. Checking for Redirects/Symlinks in the main root ==="
    # Sometimes 'manuals' is a symlink we can't see without -la
    - ls -la /data/www/dcache.org/