stages:
  - build
  - deploy

variables:
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true -DdeployAtEnd=true -Dmaven.repo.local=.m2/repository"
  MANUALS_DIR: "/data/www/old-dcache.org/manuals"
  FRAGS_DIR: "/data/www/old-dcache.org/template/frags"
  BOOK_VERSION: "11.2"
  BOOK_DEPLOY_DIR: "${MANUALS_DIR}/Book-11.2-dryrun"
  USERGUIDE_DEPLOY_DIR: "${MANUALS_DIR}/UserGuide-11.2-dryrun"

# BUILD STAGE: Same logic for both
.build_template: &build_definition
  image: maven:3.9.12-eclipse-temurin-21
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests -pl $MODULE_PATH -am clean install -P dcache.org
    - tar -czf ${ARTIFACT_NAME}.tar.gz -C $MODULE_PATH/target/intermediate-html .
  artifacts:
    paths: ["${ARTIFACT_NAME}.tar.gz"]

build-thebook:
  <<: *build_definition
  stage: build
  variables:
    MODULE_PATH: "docs/TheBook"
    ARTIFACT_NAME: "TheBook-shtml"

build-userguide:
  <<: *build_definition
  stage: build
  variables:
    MODULE_PATH: "docs/UserGuide"
    ARTIFACT_NAME: "UserGuide-shtml"

# DEPLOY STAGE
.deploy_template: &deploy_definition
  tags: [hugo, www.dcache.org]
  script:
    - echo "=== Phase 1 - Extract and Clean Staging ==="
    - STAGING_DIR="${DEPLOY_DIR}_staging"
    - rm -rf "$STAGING_DIR" && mkdir -p "$STAGING_DIR"
    - tar -xzf ${ARTIFACT_NAME}.tar.gz -C "$STAGING_DIR"

    - echo "=== Phase 2 - Aggressive Placeholder Resolution ==="
    - |
      for f in $(find "$STAGING_DIR" -name "*.shtml"); do
        # Replace ALL variations of @parsedVersion... with the BOOK_VERSION
        sed -i "s/@parsedVersion[^@]*@/${BOOK_VERSION}/g" "$f"
        # Fix GitHub Ribbon
        sed -i "s|@github\.url-prefix@|https://github.com/dCache/dcache/blob/master/${MODULE_PATH}/src/main/markdown|g" "$f"
        sed -i "/github-fork-ribbon/s/\.shtml/\.md/g" "$f"
      done

    - echo "=== Phase 3 - Atomic Deploy ==="
    # This removes the need for manual cleanup
    - if [ -d "${DEPLOY_DIR}" ]; then rm -rf "${DEPLOY_DIR}_old"; mv "${DEPLOY_DIR}" "${DEPLOY_DIR}_old"; fi
    - mv "$STAGING_DIR" "${DEPLOY_DIR}"
    - rm -rf "${DEPLOY_DIR}_old"
    - echo "Deployed to ${DEPLOY_DIR}"

deploy-thebook:
  <<: *deploy_definition
  stage: deploy
  dependencies: [build-thebook]
  variables:
    ARTIFACT_NAME: "TheBook-shtml"
    DEPLOY_DIR: "${BOOK_DEPLOY_DIR}"
    MODULE_PATH: "docs/TheBook"

deploy-userguide:
  <<: *deploy_definition
  stage: deploy
  dependencies: [build-userguide]
  variables:
    ARTIFACT_NAME: "UserGuide-shtml"
    DEPLOY_DIR: "${USERGUIDE_DEPLOY_DIR}"
    MODULE_PATH: "docs/UserGuide"