    - |
      UG_VERSIONS="5.1 5.2 6.0 6.1 6.2 7.0 7.1 7.2 8.0 8.1 8.2 9.0 9.1 9.2 10.0 10.1 10.2 11.0 11.1 11.2"
      if ! echo "$UG_VERSIONS" | grep -qw "$BOOK_VERSION"; then
        UG_VERSIONS="$UG_VERSIONS $BOOK_VERSION"
      fi

      BOOK_VERSIONS="5.0 5.1 5.2 6.0 6.1 6.2 7.0 7.1 7.2 8.0 8.1 8.2 9.0 9.1 9.2 10.0 10.1 10.2 11.0 11.1 11.2"
      if ! echo "$BOOK_VERSIONS" | grep -qw "$BOOK_VERSION"; then
        BOOK_VERSIONS="$BOOK_VERSIONS $BOOK_VERSION"
