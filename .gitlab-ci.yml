stages:
  - build
  - deploy

variables:
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true -DdeployAtEnd=true -Dmaven.repo.local=.m2/repository"
  MANUALS_DIR: "/data/www/old-dcache.org/manuals"
  DRY_RUN_DIR: "/data/www/old-dcache.org/manuals/Book-11.2-dryrun"

build-thebook:
  stage: build
  image: maven:3.9.12-eclipse-temurin-21
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests -pl docs/TheBook -am clean install
    - cd docs/TheBook/target/
    - mkdir shtml_build
    - cp -r html/* shtml_build/
    - cd shtml_build
    - find . -name "*.html" -exec sh -c 'mv "$1" "${1%.html}.shtml"' _ {} \;
    - find . -name "*.shtml" -exec sed -i 's/\.html/\.shtml/g' {} +
    - tar -czf ../TheBook-shtml.tar.gz .
  artifacts:
    paths:
      - "docs/TheBook/target/TheBook-shtml.tar.gz"
    expire_in: 1 day

deploy-dryrun:
  stage: deploy
  tags:
    - hugo
    - www.dcache.org
  dependencies:
    - build-thebook
  script:
    - echo "=== Safety check - making sure we only touch our dryrun dir ==="
    - echo "Target directory - ${DRY_RUN_DIR}"
    - if [ -d "${DRY_RUN_DIR}" ]; then echo "ERROR - ${DRY_RUN_DIR} already exists. Remove it manually first."; exit 1; fi
    - mkdir -p "${DRY_RUN_DIR}"
    - tar -xzf docs/TheBook/target/TheBook-shtml.tar.gz -C "${DRY_RUN_DIR}"
    - echo "=== Verifying ONLY our directory was touched ==="
    - echo "Files deployed:"
    - ls "${DRY_RUN_DIR}" | wc -l
    - echo "Sample files:"
    - ls "${DRY_RUN_DIR}" | head -10
    - echo "=== Spot-check - internal links in index.shtml ==="
    - grep "href" "${DRY_RUN_DIR}/index.shtml" | head -10
    - echo "lines above should be 0 (or only external links like dcache.org/...html)"
    - echo "=== Spot-check - no leftover .html links ==="
    - grep -r "\.html" "${DRY_RUN_DIR}" | grep "href" | wc -l || true
    - echo "=== Verify neighboring dirs are untouched ==="
    - ls -la "${MANUALS_DIR}/Book-10.2/"  | head -5
    - ls -la "${MANUALS_DIR}/Book-9.2/"   | head -5
    - echo "=== Done. Dry run directory is - ${DRY_RUN_DIR} ==="
    - echo "Visit https://www.dcache.org/old/manuals/Book-11.0-dryrun/index.shtml to preview"
    - echo "=== Check SSI includes in our files ==="
    - grep -r "<!--#include" "${DRY_RUN_DIR}" | head -5 || echo "No SSI includes found in our files"

    - echo "=== Compare with production Book-10.2 ==="
    - grep -r "<!--#include" "${MANUALS_DIR}/Book-10.2/" | head -5 || echo "No SSI includes in Book-10.2 either"

    - echo "=== Check nginx config for SSI ==="
    - cat /etc/nginx/conf.d/*.conf 2>/dev/null | grep -A5 -i "ssi\|include\|old-dcache" | head -30 || true
    - cat /etc/nginx/nginx.conf 2>/dev/null | grep -i "ssi" | head -10 || true

    - echo "=== Check what a production shtml actually looks like (first 30 lines) ==="
    - head -30 "${MANUALS_DIR}/Book-10.2/index.shtml"

    - echo "=== Compare with our generated shtml (first 30 lines) ==="
    - head -30 "${DRY_RUN_DIR}/index.shtml"

cleanup-dryrun:
  stage: deploy
  tags:
    - hugo
    - www.dcache.org
  when: manual
  script:
    - rm -rf "${DRY_RUN_DIR}"
    - echo "Cleaned up ${DRY_RUN_DIR}"