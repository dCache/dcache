stages:
  - build
  - deploy

variables:
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true -DdeployAtEnd=true -Dmaven.repo.local=.m2/repository"
  MANUALS_DIR: "/data/www/old-dcache.org/manuals"
  DRY_RUN_DIR: "/data/www/old-dcache.org/manuals/Book-11.2-dryrun"
  BOOK_VERSION: "11.2"
  FRAGS_DIR: "/data/www/old-dcache.org/template/frags"

build-thebook:
  stage: build
  image: maven:3.9.12-eclipse-temurin-21
  script:
    - echo "=== Check what the dcache.org profile does ==="
    - cat docs/TheBook/pom.xml | grep -A 30 "dcache.org"

    - echo "=== Build with dcache.org profile ==="
    - mvn $MAVEN_CLI_OPTS -DskipTests -pl docs/TheBook -am clean install -P dcache.org

    - echo "=== Check first 30 lines of a generated file ==="
    - head -30 docs/TheBook/target/html/config-acl.html || true
    - head -30 docs/TheBook/target/html/index.html || true
  artifacts:
    paths:
      - "docs/TheBook/target/TheBook-shtml.tar.gz"
    expire_in: 1 day

deploy-dryrun:
  stage: deploy
  tags:
    - hugo
    - www.dcache.org
  dependencies:
    - build-thebook
  script:
    - echo "=== Phase 1 - Safety checks ==="
    - |
      if [ -d "${DRY_RUN_DIR}" ]; then
        echo "ERROR - ${DRY_RUN_DIR} already exists. Remove it first."
        exit 1
      fi

    - echo "=== Phase 2 - Ensure header fragment exists for this version ==="
    - |
      if [ ! -f "${FRAGS_DIR}/header-docs-${BOOK_VERSION}.shtml" ]; then
        cp "${FRAGS_DIR}/header-docs-10.2.shtml" "${FRAGS_DIR}/header-docs-${BOOK_VERSION}.shtml"
        sed -i "s/10\.2/${BOOK_VERSION}/g" "${FRAGS_DIR}/header-docs-${BOOK_VERSION}.shtml"
        echo "Created header-docs-${BOOK_VERSION}.shtml"
      else
        echo "header-docs-${BOOK_VERSION}.shtml already exists, skipping"
      fi

    - echo "=== Phase 3 - Extract to staging ==="
    - STAGING_DIR="${DRY_RUN_DIR}_staging"
    - mkdir -p "$STAGING_DIR"
    - tar -xzf docs/TheBook/target/TheBook-shtml.tar.gz -C "$STAGING_DIR"
    - SHTML_COUNT=$(find "$STAGING_DIR" -name "*.shtml" | wc -l)
    - echo "Extracted $SHTML_COUNT shtml files"
    - |
      if [ "$SHTML_COUNT" -lt 10 ]; then
        echo "ERROR - too few shtml files extracted"
        exit 1
      fi

    - echo "=== Phase 4 - Inject SSI headers into all shtml files ==="
    - |
      for f in "$STAGING_DIR"/*.shtml; do
        if grep -q "include virtual" "$f"; then
          echo "SKIP already has SSI - $f"
          continue
        fi
        BASENAME=$(basename "$f" .shtml)
        RIBBON="<a class=\"github-fork-ribbon\" href=\"https://github.com/dCache/dcache/blob/master/docs/TheBook/src/main/markdown/${BASENAME}.md\" data-ribbon=\"Edit me on GitHub\" title=\"Edit me on GitHub\">Edit me on GitHub</a>"
        sed -i 's|<head>|<head>\n    <!--#include virtual="/template/frags/std-html-head.shtml"-->|' "$f"
        sed -i "s|<body>|<body>\n<!--#include virtual=\"/template/frags/header-beginning.shtml\" -->\n<!--#include virtual=\"/template/frags/header-docs-11.2.shtml\" -->\n<!--#include virtual=\"/template/frags/header-end.shtml\" -->\n${RIBBON}|" "$f"
        sed -i 's|</body>|<!--#include virtual="/template/frags/footer.shtml"-->\n</body>|' "$f"
      done
    - echo "=== Creating missing header fragment for 11.2 ==="
    - FRAGS_DIR="/data/www/old-dcache.org/template/frags"
    - |
      if [ ! -f "${FRAGS_DIR}/header-docs-11.2.shtml" ]; then
        cp "${FRAGS_DIR}/header-docs-10.2.shtml" "${FRAGS_DIR}/header-docs-11.2.shtml"
        sed -i 's/10\.2/11.2/g' "${FRAGS_DIR}/header-docs-11.2.shtml"
        echo "Created header-docs-11.2.shtml"
      else
        echo "header-docs-11.2.shtml already exists, skipping"
      fi
    - echo "--- Verify the new fragment looks correct ---"
    - cat "${FRAGS_DIR}/header-docs-11.2.shtml"

    - echo "=== Phase 5 - Verify injection ==="
    - echo "--- First 20 lines of index.shtml after injection ---"
    - head -20 "$STAGING_DIR/index.shtml"
    - MISSING=$(grep -rL "include virtual" "$STAGING_DIR"/*.shtml | wc -l)
    - echo "Files still missing SSI includes $MISSING (should be 0)"

    - echo "=== Phase 6 - Deploy to dryrun dir ==="
    - mv "$STAGING_DIR" "${DRY_RUN_DIR}"
    - echo "Deployed to ${DRY_RUN_DIR}"
    - echo "Visit https://www.dcache.org/old/manuals/Book-11.2-dryrun/index.shtml"

    - echo "=== Phase 7 - Verify neighbors untouched ==="
    - ls -la "${MANUALS_DIR}/Book-10.2/" | head -3
    - ls -la "${MANUALS_DIR}/Book-9.2/" | head -3

  after_script:
    - rm -rf "${DRY_RUN_DIR}_staging" || true

cleanup-dryrun:
  stage: deploy
  tags:
    - hugo
    - www.dcache.org
  when: manual
  script:
    - rm -rf "${DRY_RUN_DIR}"
    - echo "Removed ${DRY_RUN_DIR}"