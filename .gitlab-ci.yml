stages:
  - build
  - inspect

variables:
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version -DinstallAtEnd=true -DdeployAtEnd=true -Dmaven.repo.local=.m2/repository"

build-thebook:
  stage: build
  image: maven:3.9.12-eclipse-temurin-21
  script:
    - mvn $MAVEN_CLI_OPTS -DskipTests -pl docs/TheBook -am clean install
  artifacts:
    paths:
      - "docs/TheBook/target/TheBook-*.tar.gz"
    expire_in: 1 day

inspect-thebook:
  stage: inspect
  tags:
    - hugo
    - www.dcache.org
  dependencies:
    - build-thebook
  script:
    - echo "=== Artifact received ==="
    - find . -name "TheBook-*.tar.gz"
    - echo ""
    - echo "=== Archive contents (first 20 lines) ==="
    - tar -tzvf docs/TheBook/target/TheBook-*.tar.gz | head -20
    - echo ""
    - echo "=== Website directory ==="
    - ls -la /data/www/dcache.org/ || echo "Not found or no access"
    - echo ""
    - echo "=== Manuals directory (if exists) ==="
    - ls -la /data/www/dcache.org/manuals/ || echo "No manuals dir"